<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fuklet Bookshelf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@400;600&family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    /* fuku brand tokens */
    --fuku-primary:   #2D5A27;
    --fuku-secondary: #3A6B8C;
    --fuku-accent:    #E67E22;
    --fuku-warm:      #F5D76E;
    --fuku-neutral:   #8B7355;
    --fuku-base:      #FDF6E3;

    /* bookshelf-specific */
    --wood-dark: #0e1a14;
    --wood-mid:  #1a2e20;
    --wood-light:#2a4430;
    --room:      #080e0a;
    --page-cream:#e8ddd0;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{height:100%;}
  body{min-height:100%;background:var(--room);font-family:'Noto Sans JP','Poppins',sans-serif;color:#d4c8b4;overflow-x:hidden;position:relative;}

  /* Ambient */
  .room-light{position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:140%;height:80%;background:radial-gradient(ellipse at 50% 20%,rgba(45,90,39,0.06) 0%,rgba(45,90,39,0.02) 30%,transparent 60%);pointer-events:none;z-index:0;}
  .spotlight{position:fixed;top:-5%;width:25%;height:90%;background:radial-gradient(ellipse at 50% 0%,rgba(255,240,200,0.025) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .spotlight:nth-child(1){left:15%;}.spotlight:nth-child(2){left:55%;}
  body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.5;}

  /* Header */
  .header{position:relative;z-index:2;padding:50px 40px 0;max-width:1300px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;}
  .header h1{font-family:'Shippori Mincho',serif;font-size:38px;font-weight:300;color:var(--fuku-primary);letter-spacing:10px;text-shadow:0 0 40px rgba(45,90,39,0.15);}
  .header .divider-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--fuku-secondary),transparent);margin:12px 0;}
  .header .tagline{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fuku-neutral);letter-spacing:4px;text-transform:uppercase;}

  .header-right{display:flex;align-items:center;gap:12px;}
  .sort-btn{background:none;border:1px solid rgba(45,90,39,0.15);color:var(--fuku-neutral);padding:7px 16px;border-radius:16px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;}
  .sort-btn:hover,.sort-btn.active{border-color:var(--fuku-primary);color:var(--fuku-primary);background:rgba(45,90,39,0.06);}
  .stat-pill{font-family:'Poppins',sans-serif;font-size:10px;color:var(--fuku-neutral);letter-spacing:1px;}
  .stat-pill b{color:var(--fuku-secondary);font-size:14px;}

  /* Scene */
  .scene{position:relative;z-index:2;max-width:1300px;margin:30px auto 60px;padding:0 30px;perspective:1000px;perspective-origin:50% 40%;}
  .case{transform-style:preserve-3d;transform:rotateX(2deg);transition:transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);}

  /* Shelf */
  .shelf{position:relative;transform-style:preserve-3d;animation:shelfIn 0.8s ease both;}
  .shelf:nth-child(1){animation-delay:0.2s;}.shelf:nth-child(2){animation-delay:0.4s;}.shelf:nth-child(3){animation-delay:0.6s;}
  @keyframes shelfIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
  .shelf-label{position:absolute;top:8px;right:20px;font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(45,90,39,0.2);letter-spacing:4px;text-transform:uppercase;z-index:5;}
  .books-row{display:flex;align-items:flex-end;gap:2px;padding:24px 30px 0;min-height:280px;transform-style:preserve-3d;}

  /* Plank */
  .plank{position:relative;height:12px;transform-style:preserve-3d;margin:0 8px;}
  .plank-top{position:absolute;inset:0;background:linear-gradient(90deg,var(--wood-dark) 0%,var(--wood-mid) 10%,var(--wood-light) 30%,var(--wood-mid) 50%,var(--wood-light) 70%,var(--wood-mid) 90%,var(--wood-dark) 100%);box-shadow:0 -1px 0 rgba(255,255,255,0.03) inset;}
  .plank-front{position:absolute;left:0;right:0;top:100%;height:22px;background:linear-gradient(180deg,var(--wood-mid),var(--wood-dark));transform-origin:top;transform:rotateX(-90deg);box-shadow:0 6px 24px rgba(0,0,0,0.6);}
  .plank-front::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(45,90,39,0.08) 50%,transparent 90%);}
  .plank-glow{position:absolute;left:5%;right:5%;top:100%;height:50px;transform-origin:top;transform:rotateX(-90deg) translateY(22px);background:linear-gradient(180deg,rgba(0,0,0,0.3),transparent);filter:blur(4px);}
  .shelf-wall{position:absolute;inset:0;bottom:12px;background:linear-gradient(180deg,rgba(8,14,10,0.2),rgba(8,14,10,0.5));z-index:-1;}

  /* Book 3D */
  .bk{position:relative;z-index:1;flex-shrink:0;transform-style:preserve-3d;cursor:pointer;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),z-index 0s,opacity 0.3s;}
  .bk:hover{transform:translateZ(50px) translateY(-18px) rotateY(-20deg);z-index:30;}
  .bk:hover .bk-glow{opacity:1;}
  .bk:active{transform:translateZ(36px) translateY(-12px) rotateY(-14deg);transition-duration:0.15s;}
  .bk.dragging-book{opacity:0.3;transform:scale(0.9)!important;z-index:0!important;}
  .bk.drag-over-left{border-left:2px solid var(--fuku-secondary);margin-left:8px;}
  .bk.drag-over-right{border-right:2px solid var(--fuku-secondary);margin-right:8px;}
  .bk-spine{border-radius:2px 0 0 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 4px;position:relative;overflow:hidden;transform-style:preserve-3d;}
  .bk-spine::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,rgba(255,255,255,0.15),rgba(255,255,255,0.03),rgba(255,255,255,0.1));}
  .bk-spine::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(transparent,rgba(0,0,0,0.3));}
  .bk-spine .g-band{position:absolute;left:5px;right:5px;height:1px;z-index:2;}
  .bk-spine .g-band.top{top:14px;background:linear-gradient(90deg,transparent,var(--fuku-neutral),transparent);opacity:0.4;}
  .bk-spine .g-band.bot{bottom:14px;background:linear-gradient(90deg,transparent,var(--fuku-neutral),transparent);opacity:0.4;}
  .bk-spine .sp-title{writing-mode:vertical-rl;font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:3px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,0.7);flex:1;display:flex;align-items:center;z-index:2;}
  .bk-spine .sp-sub{writing-mode:vertical-rl;font-family:'JetBrains Mono',monospace;font-size:7px;opacity:0.35;letter-spacing:1px;z-index:2;margin-top:4px;}
  .bk-pages{position:absolute;top:3px;bottom:3px;left:100%;width:20px;transform-origin:left;transform:rotateY(90deg);border-radius:0 2px 2px 0;overflow:hidden;}
  .bk-pages::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,var(--page-cream) 0px,var(--page-cream) 1px,#d8cfc2 1px,#d8cfc2 2px);}
  .bk-pages::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,0.15),transparent 40%,rgba(0,0,0,0.05));}
  .bk-top{position:absolute;top:0;left:0;height:20px;transform-origin:bottom;transform:rotateX(90deg);border-radius:2px 0 0 2px;filter:brightness(0.6);}
  .bk-glow{position:absolute;inset:-20px;background:radial-gradient(ellipse at 50% 50%,rgba(45,90,39,0.06),transparent 70%);opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:-1;}

  /* 16 colors - fuku-themed palette */
  .bk[data-c="0"]{--c1:#1a3520;--c2:#2a5030;--tc:#88d488;}
  .bk[data-c="1"]{--c1:#1a2d3e;--c2:#264050;--tc:#7ac0e0;}
  .bk[data-c="2"]{--c1:#35201a;--c2:#503428;--tc:#E67E22;}
  .bk[data-c="3"]{--c1:#1a3520;--c2:#285032;--tc:#88d488;}
  .bk[data-c="4"]{--c1:#1a2838;--c2:#284050;--tc:#7ab0d0;}
  .bk[data-c="5"]{--c1:#30301a;--c2:#484828;--tc:#d8d488;}
  .bk[data-c="6"]{--c1:#1c1c35;--c2:#2c2c50;--tc:#a0a0e0;}
  .bk[data-c="7"]{--c1:#35201a;--c2:#503428;--tc:#d0a888;}
  .bk[data-c="8"]{--c1:#1a3035;--c2:#284850;--tc:#70c0c8;}
  .bk[data-c="9"]{--c1:#301430;--c2:#481848;--tc:#d088c8;}
  .bk[data-c="10"]{--c1:#1e301a;--c2:#304c28;--tc:#a0d090;}
  .bk[data-c="11"]{--c1:#302020;--c2:#483030;--tc:#d8a0a0;}
  .bk[data-c="12"]{--c1:#282030;--c2:#3a3048;--tc:#b8a8d0;}
  .bk[data-c="13"]{--c1:#1a2828;--c2:#284040;--tc:#80c0b8;}
  .bk[data-c="14"]{--c1:#302818;--c2:#484028;--tc:#c8b880;}
  .bk[data-c="15"]{--c1:#281820;--c2:#402838;--tc:#c898a8;}
  .bk .bk-spine{background:linear-gradient(165deg,var(--c1),var(--c2));}.bk .bk-top{background:linear-gradient(90deg,var(--c1),var(--c2));}

  /* Decor */
  .dc{flex-shrink:0;z-index:1;transform-style:preserve-3d;}
  .dc-end{width:6px;align-self:flex-end;background:linear-gradient(135deg,#1a2e20,#0e1a14);border-radius:1px;box-shadow:2px 0 8px rgba(0,0,0,0.4);margin:0 2px;}
  .dc-plant{width:28px;margin:0 10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;}
  .dc-plant .lf{width:24px;height:30px;background:radial-gradient(ellipse at 50% 85%,#2d5a2d,#18381c);border-radius:50% 50% 20% 20%;margin-bottom:-4px;box-shadow:0 0 16px rgba(40,90,40,0.1);}
  .dc-plant .pt{width:14px;height:11px;background:linear-gradient(180deg,#906848,#604028);border-radius:2px 2px 4px 4px;}
  .dc-orb{width:22px;height:22px;border:1px solid rgba(45,90,39,0.12);border-radius:50%;margin:0 10px 8px;align-self:flex-end;background:radial-gradient(circle at 35% 35%,rgba(45,90,39,0.06),transparent);box-shadow:0 0 12px rgba(45,90,39,0.04);}

  /* ── Reader (embedded, no iframe) ── */
  .reader-mode .shelf-view{display:none;}
  .shelf-view{transition:opacity 0.4s;}

  .reader-view{
    display:none;position:fixed;inset:0;z-index:100;
    background:var(--room);
    background-image:radial-gradient(ellipse at 20% 40%,rgba(45,90,39,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 60%,rgba(58,107,140,0.08) 0%,transparent 50%);
    flex-direction:column;align-items:center;justify-content:center;
  }
  .reader-mode .reader-view{display:flex;animation:readerIn 0.6s ease;}

  @keyframes readerIn{from{opacity:0;}to{opacity:1;}}

  .reader-title-bar{color:var(--fuku-primary);font-family:'Shippori Mincho',serif;font-size:15px;letter-spacing:6px;margin-bottom:6px;text-shadow:0 2px 10px rgba(0,0,0,0.5);}

  .reader-back{
    position:fixed;top:16px;left:24px;z-index:200;
    background:rgba(8,14,10,0.7);backdrop-filter:blur(12px);
    border:1px solid rgba(58,107,140,0.15);color:var(--fuku-secondary);
    padding:10px 22px;border-radius:24px;font-family:'Noto Sans JP',sans-serif;
    font-size:14px;cursor:pointer;letter-spacing:2px;display:flex;align-items:center;gap:8px;
    transition:all 0.2s;
  }
  .reader-back:hover{background:rgba(45,90,39,0.1);border-color:var(--fuku-primary);}
  .reader-back .arrow{font-size:18px;line-height:1;}

  /* FlipBook inside reader */
  .fb-scene{perspective:2400px;perspective-origin:50% 50%;margin-top:8px;}
  .fb-book{position:relative;width:1020px;height:680px;transform-style:preserve-3d;transform:rotateX(3deg);}
  .fb-book::after{content:'';position:absolute;bottom:-40px;left:6%;width:88%;height:56px;background:radial-gradient(ellipse,rgba(0,0,0,0.55) 0%,transparent 70%);filter:blur(12px);}
  .fb-book::before{content:'';position:absolute;left:50%;top:0;width:8px;height:100%;transform:translateX(-50%);background:linear-gradient(to right,rgba(0,0,0,0.15),rgba(0,0,0,0.35),rgba(0,0,0,0.15));z-index:100;pointer-events:none;}

  .fb-page{position:absolute;width:50%;height:100%;top:0;right:0;transform-origin:left center;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.22,0.61,0.36,1);cursor:grab;z-index:1;}
  .fb-page.dragging{transition:none;cursor:grabbing;}
  .fb-page.flipped{transform:rotateY(-180deg);z-index:0;}
  .fb-page.snap-back{transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);}
  .fb-page.snap-complete{transition:transform 0.5s cubic-bezier(0.22,0.61,0.36,1);}
  .fb-page .front,.fb-page .back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:0 10px 10px 0;overflow:hidden;display:flex;flex-direction:column;padding:44px 40px;}
  .fb-page .front{background:linear-gradient(135deg,#FDF6E3 0%,#f5f0e8 100%);border-left:1px solid #e0d6c2;box-shadow:inset -10px 0 28px rgba(0,0,0,0.06),3px 0 10px rgba(0,0,0,0.1);}
  .fb-page .back{background:linear-gradient(225deg,#FDF6E3 0%,#f5f0e8 100%);transform:rotateY(180deg);border-radius:10px 0 0 10px;border-right:1px solid #e0d6c2;border-left:none;box-shadow:inset 10px 0 28px rgba(0,0,0,0.06),-3px 0 10px rgba(0,0,0,0.1);}
  .fb-page:not(.flipped):hover .front{box-shadow:inset -14px 0 36px rgba(0,0,0,0.1),5px 0 14px rgba(0,0,0,0.15);}
  .fb-left{position:absolute;width:50%;height:100%;left:0;top:0;background:linear-gradient(225deg,#FDF6E3 0%,#f5f0e8 100%);border-radius:10px 0 0 10px;border-right:1px solid #e0d6c2;box-shadow:inset 10px 0 28px rgba(0,0,0,0.06);display:flex;flex-direction:column;padding:44px 40px;overflow:hidden;}

  .fb-nav{display:flex;align-items:center;gap:28px;margin-top:24px;}
  .fb-nav button{background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);color:#d0c8b8;padding:12px 30px;border-radius:40px;font-size:14px;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans JP',sans-serif;}
  .fb-nav button:hover{background:rgba(45,90,39,0.12);color:#fff;transform:translateY(-1px);}
  .fb-nav button:disabled{opacity:0.25;cursor:not-allowed;transform:none;}
  .fb-indicator{color:var(--fuku-neutral);font-size:13px;letter-spacing:2px;}

  /* FlipBook content styles (fuku colors) */
  .page-number{font-size:11px;color:#8B7355;text-align:right;margin-bottom:18px;letter-spacing:2px;}
  .fb-left .page-number{text-align:left;}
  .chapter-label{font-size:11px;color:#E67E22;letter-spacing:6px;margin-bottom:8px;font-weight:700;}
  .page-title{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:700;color:#2c2416;margin-bottom:18px;line-height:1.5;}
  .page-body{font-size:15px;line-height:2;color:#3a3328;flex:1;overflow:hidden;}
  .page-body p{margin-bottom:14px;}
  .page-body .dropcap::first-letter{font-size:52px;float:left;line-height:0.8;margin:6px 12px 0 0;color:#2D5A27;font-weight:700;}
  .divider{text-align:center;margin:18px 0;color:#3A6B8C;font-size:16px;letter-spacing:8px;}
  .quote{border-left:3px solid #3A6B8C;padding:14px 22px;margin:16px 0;color:#5a4e3e;font-size:14px;line-height:1.9;background:rgba(58,107,140,0.06);border-radius:0 6px 6px 0;}
  .code-block{background:#1e1e2e;color:#cdd6f4;border-radius:8px;padding:16px 20px;margin:14px 0;font-family:'JetBrains Mono','Fira Code',monospace;font-size:12.5px;line-height:1.7;overflow:hidden;position:relative;}
  .code-block .code-label{position:absolute;top:8px;right:12px;font-size:10px;color:#6c7086;letter-spacing:1px;}
  .code-block .comment{color:#6c7086;}.code-block .keyword{color:#cba6f7;}.code-block .string{color:#a6e3a1;}.code-block .property{color:#89b4fa;}
  .tip-box{background:linear-gradient(135deg,rgba(58,107,140,0.06),rgba(45,90,39,0.06));border:1px solid rgba(58,107,140,0.2);border-radius:8px;padding:14px 18px;margin:14px 0;}
  .tip-box .tip-title{font-size:11px;font-weight:700;color:#3A6B8C;letter-spacing:2px;margin-bottom:8px;}
  .tip-box ul{padding-left:18px;font-size:13px;line-height:1.9;color:#5a4e3e;}
  .timeline-item{padding:8px 0 8px 20px;border-left:2px solid rgba(45,90,39,0.2);margin:6px 0;font-size:14px;line-height:1.7;}
  .cover-front{border-radius:0 10px 10px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;position:absolute;inset:0;overflow:hidden;}
  .cover-front::before{content:'';position:absolute;inset:10px;border:1px solid rgba(45,90,39,0.2);border-radius:6px;pointer-events:none;}
  .cover-front .cover-title{font-family:'Shippori Mincho',serif;font-size:34px;color:#2D5A27;text-align:center;margin-bottom:8px;letter-spacing:4px;text-shadow:0 2px 12px rgba(0,0,0,0.5);font-weight:700;}
  .cover-front .cover-subtitle{font-size:14px;color:#8aaa78;text-align:center;letter-spacing:4px;margin-bottom:28px;}
  .cover-front .cover-ornament{color:#E67E22;font-size:20px;letter-spacing:12px;margin:14px 0;opacity:0.5;}
  .cover-left{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:10px 0 0 10px;}
  .cover-left .spine-text{writing-mode:vertical-rl;color:#5a7a50;font-size:12px;letter-spacing:8px;}
  .flip-hint{position:absolute;right:24px;bottom:22px;color:rgba(45,90,39,0.5);font-size:12px;animation:hintPulse 2s ease-in-out infinite;}
  @keyframes hintPulse{0%,100%{opacity:0.3;transform:translateX(0);}50%{opacity:0.8;transform:translateX(-6px);}}
  strong{color:#2c2416;}

  /* Not generated modal */
  .ov{position:fixed;inset:0;background:rgba(6,8,6,0.85);backdrop-filter:blur(20px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .ov.on{opacity:1;pointer-events:auto;}
  .modal{background:#0e1a14;border:1px solid rgba(45,90,39,0.08);border-radius:16px;padding:40px;width:440px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
  .modal .x-btn{position:absolute;top:16px;right:18px;width:28px;height:28px;border:1px solid rgba(255,255,255,0.06);background:none;color:var(--fuku-neutral);border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .modal .x-btn:hover{border-color:var(--fuku-neutral);color:var(--fuku-primary);}
  .modal .m-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fuku-primary);letter-spacing:4px;}
  .modal .m-title{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:600;color:var(--fuku-secondary);margin:8px 0 20px;line-height:1.4;}
  .modal ul{list-style:none;margin-bottom:20px;}
  .modal ul li{padding:10px 0;border-bottom:1px solid rgba(45,90,39,0.05);font-size:14px;display:flex;align-items:center;gap:14px;color:#c0b8a8;}
  .modal ul li:last-child{border-bottom:none;}
  .modal ul li .ci{width:22px;height:22px;border:1px solid rgba(45,90,39,0.15);color:var(--fuku-primary);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;flex-shrink:0;}
  .modal .open-btn.off{display:block;width:100%;padding:14px;background:rgba(45,90,39,0.06);color:var(--fuku-neutral);border:none;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;letter-spacing:4px;cursor:default;}

  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--fuku-neutral);border-radius:2px;}
</style>
</head>
<body>

n        </ul>\n      </div>\n    ", "leftContent": "\n      <div class=\"page-number\">1</div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0.4;\">\n        <div class=\"divider\">&#9671;</div>\n        <p style=\"text-align:center;color:#8a7a68;font-size:12px;\">24/7 OPCを始める</p>\n      </div>\n    "}, {"front": "\n      <div class=\"page-number\">3</div>\n      <div class=\"chapter-label\">第2章</div>\n      <div class=\"page-title\">VPSを用意する</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <p class=\"dropcap\">24時間稼働には、常に動いているサーバーが必要です。</p>\n        <div class=\"tip-box\">\n          <div class=\"tip-title\">RECOMMENDED VPS</div>\n          <ul>\n            <li><strong>DigitalOcean</strong> — シンプルで初心者向け（$4/月~）</li>\n            <li><strong>Vultr</strong> — コスパが良い（$2.5/月~）</li>\n            <li><strong>Linode</strong> — 安定性が高い（$5/月~）</li>\n            <li><strong>Sevalla</strong> — PaaS管理不要（$5/月~）</li>\n          </ul>\n        </div>\n      </div>\n      <div class=\"flip-hint\">ドラッグでめくる &#10148;</div>\n    ", "back": "\n      <div class=\"page-number\">4</div>\n      <div class=\"chapter-label\">第2章</div>\n      <div class=\"page-title\" style=\"font-size:20px;\">最低要件</div>\n      <div class=\"divider\">&#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"code-block\">\n          <div class=\"code-label\">SPEC</div>\n          <span class=\"comment\"># 最低要件</span><br>\n          <span class=\"property\">CPU</span>: <span class=\"string\">1コア</span><br>\n          <span class=\"property\">Memory</span>: <span class=\"string\">1GB</span><br>\n          <span class=\"property\">Storage</span>: <span class=\"string\">25GB</span><br>\n          <span class=\"property\">OS</span>: <span class=\"string\">Ubuntu 22.04</span>\n        </div>\n        <p style=\"margin-top:18px;font-size:13px;color:#8a7a68;\">これ以上のスペックがあれば、より快適に運用できます。</p>\n      </div>\n    ", "leftContent": "\n      <div class=\"page-number\">2</div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0.4;\">\n        <div class=\"divider\">&#9671;</div>\n        <p style=\"text-align:center;color:#8a7a68;font-size:12px;\">必要なもの</p>\n      </div>\n    "}, {"front": "\n      <div class=\"page-number\">5</div>\n      <div class=\"chapter-label\">第3章</div>\n      <div class=\"page-title\">OpenClawをインストール</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"code-block\">\n          <div class=\"code-label\">bash</div>\n          <span class=\"comment\"># サーバーに接続</span><br>\n          <span class=\"keyword\">ssh</span> root@your-server-ip<br><br>\n          <span class=\"comment\"># 依存関係をインストール</span><br>\n          apt update && apt install -y nodejs npm git<br><br>\n          <span class=\"comment\"># リポジトリをクローン</span><br>\n          <span class=\"keyword\">git</span> clone https://github.com/openclaw/openclaw.git<br>\n          <span class=\"keyword\">cd</span> openclaw<br><br>\n          <span class=\"comment\"># 依存関係をインストール</span><br>\n          npm install\n        </div>\n      </div>\n      <div class=\"flip-hint\">ドラッグでめくる &#10148;</div>\n    ", "back": "\n      <div class=\"page-number\">6</div>\n      <div class=\"chapter-label\">第3章</div>\n      <div class=\"page-title\" style=\"font-size:20px;\">.envファイルの設定</div>\n      <div class=\"divider\">&#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"code-block\">\n          <div class=\"code-label\">env</div>\n          <span class=\"comment\"># Telegram Bot</span><br>\n          <span class=\"property\">TELEGRAM_BOT_TOKEN</span>=<span class=\"string\">your-bot-token</span><br><br>\n          <span class=\"comment\"># AI Provider</span><br>\n          <span class=\"property\">OPENAI_API_KEY</span>=<span class=\"string\">your-openai-key</span><br>\n          <span class=\"comment\"># または</span><br>\n          <span class=\"property\">ANTHROPIC_API_KEY</span>=<span class=\"string\">your-anthropic-key</span><br><br>\n          <span class=\"comment\"># データベース（オプション）</span><br>\n          <span class=\"property\">DATABASE_URL</span>=<span class=\"string\">postgresql://localhost:5432/openclaw</span>\n        </div>\n        <p style=\"margin-top:14px;font-size:13px;color:#8a7a68;\"><code>cp .env.example .env</code> でテンプレートをコピーして編集。</p>\n      </div>\n    ", "leftContent": "\n      <div class=\"page-number\">4</div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0.4;\">\n        <div class=\"divider\">&#9671;</div>\n        <p style=\"text-align:center;color:#8a7a68;font-size:12px;\">VPSを用意する</p>\n      </div>\n    "}, {"front": "\n      <div class=\"page-number\">7</div>\n      <div class=\"chapter-label\">第4章</div>\n      <div class=\"page-title\">Telegram Botを作成</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"tip-box\">\n          <div class=\"tip-title\">STEPS</div>\n          <ul>\n            <li>Telegramで <code>@BotFather</code> を検索</li>\n            <li><code>/newbot</code> を送信</li>\n            <li>ボット名を入力</li>\n            <li>トークンをコピーして <code>.env</code> に貼り付け</li>\n          </ul>\n        </div>\n        <p style=\"margin-top:16px;font-size:13px;color:#8a7a68;\">Telegram Botは、あなたとAIエージェントのインターフェースになります。</p>\n      </div>\n      <div class=\"flip-hint\">ドラッグでめくる &#10148;</div>\n    ", "back": "\n      <div class=\"page-number\">8</div>\n      <div class=\"chapter-label\">第5章</div>\n      <div class=\"page-title\" style=\"font-size:22px;\">OpenClawを起動</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"code-block\">\n          <div class=\"code-label\">bash</div>\n          <span class=\"comment\"># 開発モードで起動</span><br>\n          npm run start:telegram<br><br>\n          <span class=\"comment\"># 本番モード（PM2を使用）</span><br>\n          npm install -g pm2<br>\n          pm2 start npm --name <span class=\"string\">\"openclaw\"</span> -- run start:telegram<br>\n          pm2 save<br>\n          pm2 startup\n        </div>\n        <p style=\"margin-top:14px;font-size:13px;color:#8a7a68;\">PM2はプロセスマネージャー。サーバー再起動後も自動的にOpenClawが起動します。</p>\n      </div>\n    ", "leftContent": "\n      <div class=\"page-number\">6</div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0.4;\">\n        <div class=\"divider\">&#9671;</div>\n        <p style=\"text-align:center;color:#8a7a68;font-size:12px;\">OpenClawをインストール</p>\n      </div>\n    "}, {"front": "\n      <div class=\"page-number\">9</div>\n      <div class=\"chapter-label\">第6章</div>\n      <div class=\"page-title\">Claude Codeを設定</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <p>ローカル環境でClaude Codeを設定:</p>\n        <div class=\"code-block\">\n          <div class=\"code-label\">bash</div>\n          <span class=\"comment\"># インストール</span><br>\n          npm install -g @anthropic-ai/claude-code<br><br>\n          <span class=\"comment\"># APIキーを設定</span><br>\n          claude-code config set apiKey<br><br>\n          <span class=\"comment\"># プロジェクトでCLAUDE.mdを作成</span>\n        </div>\n      </div>\n      <div class=\"flip-hint\">ドラッグでめくる &#10148;</div>\n    ", "back": "\n      <div class=\"page-number\">10</div>\n      <div class=\"chapter-label\">第6章</div>\n      <div class=\"page-title\" style=\"font-size:20px;\">CLAUDE.mdの例</div>\n      <div class=\"divider\">&#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"code-block\" style=\"font-size:11.5px;\">\n          <div class=\"code-label\">markdown</div>\n          <span class=\"comment\"># CLAUDE.md</span><br><br>\n          <span class=\"keyword\">## プロジェクト概要</span><br>\n          個人プロジェクトで24/7 OPCを実験中。<br><br>\n          <span class=\"keyword\">## 技術スタック</span><br>\n          - OpenClaw: オーケストレーター<br>\n          - Claude Code: 開発支援<br><br>\n          <span class=\"keyword\">## 開発コマンド</span><br>\n          - OpenClaw起動: <span class=\"string\">npm run start:telegram</span><br>\n          - ログ確認: <span class=\"string\">pm2 logs openclaw</span><br><br>\n          <span class=\"keyword\">## ルール</span><br>\n          - 本番データでテストしない<br>\n          - APIキーをコミットしない\n        </div>\n      </div>\n    ", "leftContent": "\n      <div class=\"page-number\">8</div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0.4;\">\n        <div class=\"divider\">&#9671;</div>\n        <p style=\"text-align:center;color:#8a7a68;font-size:12px;\">OpenClawを起動</p>\n      </div>\n    "}, {"front": "\n      <div class=\"page-number\">11</div>\n      <div class=\"chapter-label\">第7章</div>\n      <div class=\"page-title\">自動化を設計</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <p class=\"dropcap\">最初は小さな自動化から始めましょう。</p>\n        <div class=\"tip-box\">\n          <div class=\"tip-title\">FIRST AUTOMATION TASKS</div>\n          <ul>\n            <li><strong>メールチェック</strong>: 毎朝サマリーを送信</li>\n            <li><strong>ファイル整理</strong>: 定期的なクリーンアップ</li>\n            <li><strong>レポート生成</strong>: 週次レポートの作成</li>\n          </ul>\n        </div>\n        <p style=\"font-weight:700;margin-top:16px;\">設計のポイント</p>\n        <ul style=\"padding-left:18px;font-size:14px;line-height:2;\">\n          <li>小さく始める</li>\n          <li>人間の承認を含める</li>\n          <li>ログを残す</li>\n        </ul>\n      </div>\n      <div class=\"flip-hint\">ドラッグでめくる &#10148;</div>\n    ", "back": "\n      <div class=\"page-number\">12</div>\n      <div class=\"chapter-label\">第7章</div>\n      <div class=\"page-title\" style=\"font-size:20px;\">セキュリティの基本</div>\n      <div class=\"divider\">&#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"comparison\">\n          <div class=\"col bad\">\n            <div class=\"col-label\">&#10007; やってはいけないこと</div>\n            <p>APIキーをコードにハードコード</p>\n            <p>rootユーザーで実行</p>\n            <p>ファイアウォールなしで公開</p>\n          </div>\n          <div class=\"col good\">\n            <div class=\"col-label\">&#10003; やるべきこと</div>\n            <p>環境変数で機密情報を管理</p>\n            <p>専用ユーザーを作成</p>\n            <p>UFWでファイアウォールを設定</p>\n          </div>\n        </div>\n        <div class=\"code-block\" style=\"font-size:11.5px;\">\n          <span class=\"comment\"># ファイアウォール設定</span><br>\n          ufw allow ssh<br>\n          ufw allow 80<br>\n          ufw allow 443<br>\n          ufw enable\n        </div>\n      </div>\n    ", "leftContent": "\n      <div class=\"page-number\">10</div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0.4;\">\n        <div class=\"divider\">&#9671;</div>\n        <p style=\"text-align:center;color:#8a7a68;font-size:12px;\">Claude Codeを設定</p>\n      </div>\n    "}, {"front": "\n      <div class=\"page-number\">13</div>\n      <div class=\"chapter-label\">第8章</div>\n      <div class=\"page-title\">トラブルシューティング</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <p style=\"font-weight:700;margin-bottom:8px;\">OpenClawが起動しない</p>\n        <div class=\"code-block\" style=\"font-size:11.5px;\">\n          <span class=\"comment\"># ログを確認</span><br>\n          pm2 logs openclaw<br><br>\n          <span class=\"comment\"># 依存関係を再インストール</span><br>\n          rm -rf node_modules && npm install\n        </div>\n        <p style=\"font-weight:700;margin-top:14px;margin-bottom:8px;\">Telegramが応答しない</p>\n        <div class=\"code-block\" style=\"font-size:11.5px;\">\n          <span class=\"comment\"># ボットトークンを確認</span><br>\n          curl https://api.telegram.org/botTOKEN/getMe<br><br>\n          <span class=\"comment\"># Webhookをクリア</span><br>\n          curl https://api.telegram.org/botTOKEN/deleteWebhook\n        </div>\n      </div>\n      <div class=\"flip-hint\">ドラッグでめくる &#10148;</div>\n    ", "back": "\n      <div class=\"page-number\">14</div>\n      <div class=\"chapter-label\">NEXT STEPS</div>\n      <div class=\"page-title\" style=\"font-size:22px;\">次のステップ</div>\n      <div class=\"divider\">&#9671; &#9671; &#9671;</div>\n      <div class=\"page-body\">\n        <div class=\"tip-box\">\n          <div class=\"tip-title\">ROADMAP</div>\n          <ul>\n            <li><strong>スキルを追加</strong>: OpenClawのコミュニティスキルを活用</li>\n            <li><strong>Claude Codeとの連携</strong>: openclaw-claude-code-skillを導入</li>\n            <li><strong>監視の追加</strong>: エラー通知を設定</li>\n            <li><strong>バックアップ</strong>: 定期的なバックアップを自動化</li>\n          </ul>\n        </div>\n        <div class=\"quote\">\n          最初は小さく始めて、徐々に自動化の範囲を広げていくのがコツです。\n        </div>\n        <div style=\"text-align:center;margin-top:24px;\">\n          <span class=\"tag\">OPC</span>\n          <span class=\"tag\">AI</span>\n          <span class=\"tag\">Automation</span>\n          <span class=\"tag\">Beginner</span>\n        </div>\n      </div>\n    ", "leftContent": "\n      <div class=\"page-number\">12</div>\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0.4;\">\n        <div class=\"divider\">&#9671;</div>\n        <p style=\"text-align:center;color:#8a7a68;font-size:12px;\">自動化を設計</p>\n      </div>\n    "}]}];

let allBooks=[];
let books=[];
let currentSort='date-desc';

async function loadBooks(){
  // Try fetch first (works with http://), fall back to embedded data (works with file://)
  try {
    const res = await fetch('books.json');
    if(res.ok){ allBooks = await res.json(); }
    else { throw new Error('HTTP '+res.status); }
  } catch(e) {
    // file:// protocol or CORS: use embedded BOOK_DATA if available
    if(typeof BOOK_DATA!=='undefined' && Array.isArray(BOOK_DATA)){
      allBooks = BOOK_DATA;
    } else {
      console.warn('books.json load failed and no embedded data. Start a server: npx serve .');
      allBooks = [];
    }
  }
  books=[...allBooks];
  renderShelf();
}

function sortBooks(mode){
  currentSort=mode;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(mode==='date-desc') books=[...allBooks];
  else if(mode==='date-asc') books=[...allBooks].reverse();
  else if(mode==='sessions') books=[...allBooks].sort((a,b)=>b.sessions-a.sessions);
  renderShelf();
}

function renderShelf(){
  const per=8,sc=Math.ceil(books.length/per);
  let html='';
  for(let s=0;s<sc;s++){
    const st=s*per,en=Math.min(st+per,books.length),sb=books.slice(st,en);
    html+=`<div class="shelf"><div class="shelf-wall"></div><div class="books-row">`;
    html+='<div class="dc dc-end" style="height:130px;"></div>';
    if(s===0) html+='<div class="dc dc-plant"><div class="lf"></div><div class="pt"></div></div>';
    sb.forEach((b,i)=>{
      const idx=st+i;
      const h=HS[Math.floor(sr(idx*7)*HS.length)];
      const w=WS[Math.floor(sr(idx*13)*WS.length)];
      html+=`<div class="bk" data-c="${b.color%16}" data-id="${b.id}" draggable="true" style="--h:${h}px;--w:${w}px;"
        onclick="clickBook('${b.id}')"
        ondragstart="dStart(event,'${b.id}')" ondragend="dEnd(event)"
        ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'${b.id}')">
        <div class="bk-glow"></div>
        <div class="bk-spine" style="width:${w}px;height:${h}px;">
          <div class="g-band top"></div><div class="sp-title">${b.title}</div><div class="sp-sub">${b.sessions}ch</div><div class="g-band bot"></div>
        </div>
        <div class="bk-pages" style="height:${h-6}px;"></div>
        <div class="bk-top" style="width:${w}px;"></div>
      </div>`;
    });
    html+='<div class="dc dc-end" style="height:150px;"></div>';
    if(s===0) html+='<div class="dc dc-orb"></div>';
    else if(s===1) html+='<div class="dc dc-plant"><div class="lf"></div><div class="pt"></div></div>';
    html+='</div><div class="plank"><div class="plank-top"></div><div class="plank-front"></div><div class="plank-glow"></div></div></div>';
  }
  cs.innerHTML=html;
  document.getElementById('sB').textContent=books.length;
}

function clickBook(id){
  if(dragClickPrevented){dragClickPrevented=false;return;}
  const b=allBooks.find(x=>x.id===id);
  if(!b) return;
  if(b.file && b.pages.length>0){openReader(b);}
  else{showModal(b);}
}

function showModal(b){
  document.getElementById('modal').innerHTML=`<button class="x-btn" onclick="closeM()">&#10005;</button>
    <div class="m-date">${b.date}</div>
    <div class="m-title">${b.title}</div>
    <ul>${b.chapters.map((c,j)=>`<li><span class="ci">${j+1}</span>${c}</li>`).join('')}</ul>
    <button class="open-btn off">Not Yet Generated</button>`;
  document.getElementById('ov').classList.add('on');
}
function closeM(){document.getElementById('ov').classList.remove('on');}

// ═══════════════════════════════════════
// FLIPBOOK ENGINE (embedded, no iframe)
// ═══════════════════════════════════════
let fbPages=[];
let fbCurrent=0;
let fbDragging=false,fbDragPage=null,fbDragDir=null,fbStartX=0,fbAngle=0,fbLastRustle=0,fbRect=null;
const fbBook=document.getElementById('fbBook');
const fbLeft=document.getElementById('fbLeft');
const fbInd=document.getElementById('fbIndicator');
const fbPrevBtn=document.getElementById('fbPrev');
const fbNextBtn=document.getElementById('fbNext');

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playFlip(){const b=audioCtx.sampleRate*0.25,u=audioCtx.createBuffer(1,b,audioCtx.sampleRate),d=u.getChannelData(0);for(let i=0;i<b;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/b,3)*0.35;const n=audioCtx.createBufferSource();n.buffer=u;const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(3000,audioCtx.currentTime);f.frequency.exponentialRampToValueAtTime(800,audioCtx.currentTime+0.2);f.Q.value=0.8;const g=audioCtx.createGain();g.gain.setValueAtTime(0.4,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.25);n.connect(f);f.connect(g);g.connect(audioCtx.destination);n.start();n.stop(audioCtx.currentTime+0.25);const o=audioCtx.createOscillator();o.frequency.setValueAtTime(120,audioCtx.currentTime+0.08);o.frequency.exponentialRampToValueAtTime(60,audioCtx.currentTime+0.2);o.type='sine';const g2=audioCtx.createGain();g2.gain.setValueAtTime(0,audioCtx.currentTime);g2.gain.linearRampToValueAtTime(0.15,audioCtx.currentTime+0.09);g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.22);o.connect(g2);g2.connect(audioCtx.destination);o.start(audioCtx.currentTime+0.08);o.stop(audioCtx.currentTime+0.25);}
function playRustle(t){const l=audioCtx.sampleRate*0.08,b=audioCtx.createBuffer(1,l,audioCtx.sampleRate),d=b.getChannelData(0);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,2)*0.08*t;const s=audioCtx.createBufferSource();s.buffer=b;const f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=2000;const g=audioCtx.createGain();g.gain.value=0.3;s.connect(f);f.connect(g);g.connect(audioCtx.destination);s.start();s.stop(audioCtx.currentTime+0.08);}

function openReader(book){
  fbPages=book.pages;
  fbCurrent=0;
  document.getElementById('readerTitle').textContent=book.title;
  fbBook.querySelectorAll('.fb-page').forEach(p=>p.remove());
  fbPages.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='fb-page';
    div.style.zIndex=fbPages.length-i;
    div.innerHTML='<div class="front">'+p.front+'</div><div class="back">'+p.back+'</div>';
    fbBook.appendChild(div);
  });
  fbUpdateView();
  document.body.classList.add('reader-mode');
}

function closeReader(){
  document.body.classList.remove('reader-mode');
  fbBook.querySelectorAll('.fb-page').forEach(p=>p.remove());
  fbPages=[];fbCurrent=0;
}

function fbGetPages(){return Array.from(fbBook.querySelectorAll('.fb-page'));}

function fbUpdateView(){
  fbGetPages().forEach((p,i)=>{
    if(p===fbDragPage)return;
    p.classList.remove('dragging','snap-back','snap-complete');
    p.style.transition='';p.style.transform='';
    if(i<fbCurrent){p.classList.add('flipped');p.style.zIndex=i;}
    else{p.classList.remove('flipped');p.style.zIndex=fbPages.length-i;}
  });
  if(fbCurrent>0&&fbCurrent<=fbPages.length){
    fbLeft.innerHTML='<div style="padding:44px 40px;height:100%;display:flex;flex-direction:column;">'+(fbPages[fbCurrent-1].leftContent||fbPages[fbCurrent-1].back)+'</div>';
    fbLeft.style.background='linear-gradient(225deg,#FDF6E3 0%,#f5f0e8 100%)';
  }else{
    fbLeft.innerHTML='<div class="cover-left" style="background:linear-gradient(to right,#0a1a14,#0e1f16);"><div class="spine-text">'+document.getElementById('readerTitle').textContent+'</div></div>';
    fbLeft.style.background='linear-gradient(to right,#0a1a14,#0e1f16)';
  }
  if(fbCurrent===0)fbInd.textContent='Cover';
  else if(fbCurrent>=fbPages.length)fbInd.textContent='End';
  else fbInd.textContent=(fbCurrent*2-1)+' - '+(fbCurrent*2);
  fbPrevBtn.disabled=fbCurrent===0;
  fbNextBtn.disabled=fbCurrent>=fbPages.length;
}

function finishFb(p,cb){let d=false;function h(){if(d)return;d=true;p.removeEventListener('transitionend',h);cb();}p.addEventListener('transitionend',h);setTimeout(h,700);}

// Drag handlers
function fbDragStart(e){
  if(fbDragging||!document.body.classList.contains('reader-mode'))return;
  const c=e.touches?e.touches[0].clientX:e.clientX;
  fbRect=fbBook.getBoundingClientRect();
  const cx=fbRect.left+fbRect.width/2;
  if(c>=cx){if(fbCurrent>=fbPages.length)return;fbDragPage=fbGetPages()[fbCurrent];fbDragDir='next';}
  else{if(fbCurrent<=0)return;fbDragPage=fbGetPages()[fbCurrent-1];fbDragDir='prev';}
  fbDragging=true;fbStartX=c;fbAngle=fbDragDir==='next'?0:-180;fbLastRustle=fbAngle;
  fbDragPage.classList.add('dragging');fbDragPage.classList.remove('flipped','snap-back','snap-complete');
  fbDragPage.style.zIndex=fbPages.length+1;fbDragPage.style.transform='rotateY('+fbAngle+'deg)';
  e.preventDefault();
}
function fbDragMove(e){
  if(!fbDragging||fbDragPage)return;
  const c=e.touches?e.touches[0].clientX:e.clientX;
  const dx=c-fbStartX,hw=fbRect.width/2;
  if(fbDragDir==='next')fbAngle=-Math.max(0,Math.min(1,-dx/hw))*180;
  else fbAngle=-180+Math.max(0,Math.min(1,dx/hw))*180;
  fbDragPage.style.transform='rotateY('+fbAngle+'deg)';
  if(Math.abs(fbAngle-fbLastRustle)>30){playRustle(Math.min(1,Math.abs(fbAngle-fbLastRustle)/60));fbLastRustle=fbAngle;}
  e.preventDefault();
}
function fbDragEnd(){
  if(!fbDragging||fbDragPage){fbDragging=false;return;}
  fbDragging=false;const pg=fbDragPage;fbDragPage=null;
  const a=Math.abs(fbAngle),t=50;
  if(fbDragDir==='next'){
    if(a>t){pg.classList.remove('dragging');pg.classList.add('snap-complete');pg.style.transform='rotateY(-180deg)';playFlip();fbCurrent++;finishFb(pg,()=>{pg.classList.remove('snap-complete');pg.classList.add('flipped');pg.style.zIndex=fbCurrent-1;fbUpdateView();});}
    else{pg.classList.remove('dragging');pg.classList.add('snap-back');pg.style.transform='rotateY(0deg)';finishFb(pg,()=>{pg.classList.remove('snap-back');pg.style.zIndex=fbPages.length-fbCurrent;fbUpdateView();});}
  }else{
    if(a<(180-t)){pg.classList.remove('dragging');pg.classList.add('snap-complete');pg.style.transform='rotateY(0deg)';playFlip();fbCurrent--;finishFb(pg,()=>{pg.classList.remove('snap-complete','flipped');pg.style.zIndex=fbPages.length-fbCurrent;fbUpdateView();});}
    else{pg.classList.remove('dragging');pg.classList.add('snap-back');pg.style.transform='rotateY(-180deg)';finishFb(pg,()=>{pg.classList.remove('snap-back');pg.classList.add('flipped');pg.style.zIndex=fbCurrent-1;fbUpdateView();});}
  }
}

fbBook.addEventListener('mousedown',fbDragStart);
document.addEventListener('mousemove',fbDragMove);
document.addEventListener('mouseup',fbDragEnd);
document.addEventListener('mouseleave',fbDragEnd);
fbBook.addEventListener('touchstart',fbDragStart,{passive:false});
document.addEventListener('touchmove',fbDragMove,{passive:false});
document.addEventListener('touchend',fbDragEnd);
document.addEventListener('touchcancel',fbDragEnd);
fbBook.addEventListener('selectstart',e=>e.preventDefault());

function fbNextPage(){if(fbDragging||fbCurrent>=fbPages.length)return;const pg=fbGetPages()[fbCurrent];pg.classList.add('snap-complete');pg.style.zIndex=fbPages.length+1;pg.style.transform='rotateY(-180deg)';playFlip();fbCurrent++;finishFb(pg,()=>{pg.classList.remove('snap-complete');pg.classList.add('flipped');fbUpdateView();});}
function fbPrevPage(){if(fbDragging||fbCurrent<=0)return;const pg=fbGetPages()[fbCurrent-1];pg.classList.remove('flipped');pg.classList.add('snap-complete');pg.style.zIndex=fbPages.length+1;pg.style.transform='rotateY(0deg)';playFlip();fbCurrent--;finishFb(pg,()=>{pg.classList.remove('snap-complete');fbUpdateView();});}

// ═══════════════════════════════════════
// DRAG & DROP REORDER
// ═══════════════════════════════════════
let dragBookId=null;
let dragClickPrevented=false;

function dStart(e,id){
  dragBookId=id;
  dragClickPrevented=false;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(()=>{
    const el=document.querySelector(`.bk[data-id="${id}"]`);
    if(el) el.classList.add('dragging-book');
    dragClickPrevented=true;
  },0);
}

function dEnd(e){
  document.querySelectorAll('.bk').forEach(b=>b.classList.remove('dragging-book','drag-over-left','drag-over-right'));
  dragBookId=null;
}

function dOver(e){
  if(!dragBookId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const target=e.currentTarget;
  const targetId=target.dataset.id;
  if(targetId===dragBookId) return;
  const rect=target.getBoundingClientRect();
  const midX=rect.left+rect.width/2;
  target.classList.remove('drag-over-left','drag-over-right');
  if(e.clientX<midX) target.classList.add('drag-over-left');
  else target.classList.add('drag-over-right');
}

function dLeave(e){
  e.currentTarget.classList.remove('drag-over-left','drag-over-right');
}

function dDrop(e,targetId){
  e.preventDefault();
  if(!dragBookId||dragBookId===targetId) return;
  const fromIdx=books.findIndex(b=>b.id===dragBookId);
  const toIdx=books.findIndex(b=>b.id===targetId);
  if(fromIdx===-1||toIdx===-1) return;
  const target=e.currentTarget;
  const rect=target.getBoundingClientRect();
  const dropRight=e.clientX>=rect.left+rect.width/2;
  const [moved]=books.splice(fromIdx,1);
  let insertIdx=books.findIndex(b=>b.id===targetId);
  if(dropRight) insertIdx++;
  books.splice(insertIdx,0,moved);
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  renderShelf();
  dragBookId=null;
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(document.body.classList.contains('reader-mode'))closeReader();else closeM();}
  if(!document.body.classList.contains('reader-mode'))return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();fbNextPage();}
  if(e.key==='ArrowLeft'){e.preventDefault();fbPrevPage();}
});

// Parallax (shelf only)
document.addEventListener('mousemove',e=>{
  if(document.body.classList.contains('reader-mode'))return;
  const x=(e.clientX/window.innerWidth-0.5)*2;
  const y=(e.clientY/window.innerHeight-0.5)*2;
  cs.style.transform=`rotateX(${2-y*1.5}deg) rotateY(${x*2.5}deg)`;
});

loadBooks();
</script>
